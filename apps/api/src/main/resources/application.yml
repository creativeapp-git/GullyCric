server:
  port: 8080

spring:
  application:
    name: gullycric-api

  # H2 Database Configuration (MVP)
  datasource:
    url: jdbc:h2:mem:gullycricdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Logging
logging:
  level:
    com.gullycric.api: DEBUG
    org.springframework.web.socket: DEBUG
