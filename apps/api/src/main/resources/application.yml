server:
  port: 8080

spring:
  application:
    name: gullycric-api

  # Database Configuration (PostgreSQL for Prod, H2 for Local)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:gullycricdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driverClassName: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Logging
logging:
  level:
    com.gullycric.api: DEBUG
    org.springframework.web.socket: DEBUG
